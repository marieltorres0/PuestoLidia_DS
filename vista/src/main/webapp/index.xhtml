<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Gestión de Productos - Prueba Eliminar</title>
    <style>
        .campo-formulario { margin-bottom: 15px; }
        .campo-formulario label { display: block; font-weight: bold; color: #4A4A4A; margin-bottom: 5px; }

        /* Estilo adaptado para el modal de eliminación (Rojo para advertir peligro) */
        .modal-estilo .ui-dialog-titlebar { background-color: #d9534f !important; color: white !important; text-align: center; border-bottom: 4px solid #c9302c; }
        .modal-estilo .ui-dialog-title { float: none !important; font-size: 1.2rem; font-weight: bold; }
        .modal-estilo.ui-dialog { border-radius: 12px !important; overflow: hidden; border: 2px solid #ccc; }

        .texto-confirmacion { font-size: 1.1rem; text-align: center; margin: 20px 0; color: #333; }
    </style>
</h:head>

<h:body style="padding: 30px; background-color: #f4f6f9;">

    <p:growl id="notificacion" showDetail="true" life="4000" position="top-right">
        <p:autoUpdate />
    </p:growl>

    <h:form id="formPrincipal">

        <p:commandButton value="Probar Eliminar (CON Stock)" icon="pi pi-trash" styleClass="ui-button-danger"
                         update="modalEliminar" oncomplete="PF('wvModalEliminar').show();">
            <f:setPropertyActionListener target="#{productoBeanUI.idProducto}" value="001" />
            <f:setPropertyActionListener target="#{productoBeanUI.nombre}" value="Coca Cola 600ml" />
            <f:setPropertyActionListener target="#{productoBeanUI.cantidad}" value="50" />
        </p:commandButton>



        <p:commandButton value="Probar Eliminar (SIN Stock)" icon="pi pi-trash" styleClass="ui-button-danger"
                         style="margin-left: 15px;"
                         update="modalEliminar" oncomplete="PF('wvModalEliminar').show();">
            <f:setPropertyActionListener target="#{productoBeanUI.idProducto}" value="002" />
            <f:setPropertyActionListener target="#{productoBeanUI.nombre}" value="Sabritas Sal 40g" />
            <f:setPropertyActionListener target="#{productoBeanUI.cantidad}" value="0" />
        </p:commandButton>

    </h:form>

    <p:dialog id="modalEliminar" widgetVar="wvModalEliminar"
              header="Eliminar Producto"
              styleClass="modal-estilo" modal="true" resizable="false" closeOnEscape="true"
              width="400" showEffect="fade" hideEffect="fade">

        <h:form id="formModalEliminar">

            <div class="texto-confirmacion">
                <i class="pi pi-exclamation-triangle" style="font-size: 2rem; color: #d9534f; display: block; margin-bottom: 10px;"></i>
                ¿Estás seguro de que deseas eliminar de forma permanente el producto <strong>#{productoBeanUI.nombre}</strong>?
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 25px;">
                <p:commandButton value="CANCELAR" type="button" icon="pi pi-times"
                                 styleClass="ui-button-outlined ui-button-secondary"
                                 onclick="PF('wvModalEliminar').hide();" />

                <p:commandButton value="SÍ, ELIMINAR" icon="pi pi-check"
                                 action="#{productoBeanUI.eliminarProducto}"
                                 styleClass="ui-button-danger"
                                 update=":notificacion" />
            </div>
        </h:form>
    </p:dialog>

</h:body>
</html>
