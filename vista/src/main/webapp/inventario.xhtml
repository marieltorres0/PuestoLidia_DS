<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Inventario - Puesto Lidia</title>
    <style>
        /* Fondo general */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; display: flex; justify-content: center; }

        /* Contenedor tipo "Ventana" con borde grueso */
        .pantalla-principal { width: 100%; max-width: 1100px; border: 4px solid #1a1a1a; background-color: #fff; display: flex; flex-direction: column; }

        /* Encabezados */
        .header-azul { background-color: #5b8df2; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.3rem; letter-spacing: 1px; border-bottom: 2px solid #1a1a1a; }
        .subheader-gris { background-color: #3e4a5c; color: white; padding: 10px 20px; font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; }

        /* Contenedor central blanco */
        .contenedor-interior { border: 2px solid #a0a0a0; border-radius: 10px; background: white; padding: 20px 30px; margin: 15px; }
        .titulo-consulta { text-align: center; font-size: 1.4rem; font-weight: bold; margin-bottom: 25px; color: #000; }

        /* Input de búsqueda */
        .input-busqueda { width: 350px !important; border: 2px solid #a0a0a0 !important; border-radius: 8px !important; padding: 5px 10px !important; font-size: 1rem !important; }

        /* Botones Superiores */
        .btn-top-rojo { background-color: #ff0000 !important; color: white !important; border: 3px solid #a0a0a0 !important; font-weight: bold !important; border-radius: 8px !important; padding: 2px 15px !important; box-shadow: none !important; }
        .btn-top-rojo:hover { background-color: #cc0000 !important; }

        /* Botones de Tabla */
        .btn-pildora-rojo { background-color: #ff0000 !important; color: white !important; border: 2px solid #a0a0a0 !important; font-weight: bold !important; border-radius: 20px !important; font-size: 0.8rem !important; padding: 2px 10px !important; margin-right: 5px; }
        .btn-pildora-negro { background-color: #000000 !important; color: white !important; border: 2px solid #a0a0a0 !important; font-weight: bold !important; border-radius: 20px !important; font-size: 0.8rem !important; padding: 2px 10px !important; }

        /* ========================================= */
        /* Ajustes de Tabla con Scroll (CORREGIDO)   */
        /* ========================================= */
        .tabla-lidia .ui-datatable-header { background-color: transparent; border: none; padding-bottom: 15px;}

        /* Pintar solo la cabecera real superior */
        .tabla-lidia .ui-datatable-scrollable-header th { background-color: #5b8df2 !important; color: white !important; text-align: center !important; border: none !important; padding: 10px !important; cursor: pointer; }
        .tabla-lidia .ui-datatable-scrollable-header th:hover { background-color: #4a75c9 !important; }

        /* Ocultar la cabecera fantasma que duplica PrimeFaces por el Scroll */
        .tabla-lidia .ui-datatable-scrollable-body th { padding: 0 !important; border: none !important; height: 0 !important; }

        .tabla-lidia td { text-align: center; font-weight: bold; color: #4a4a4a; border-bottom: 1px solid #dee2e6 !important; border-right: none !important; border-left: none !important; padding: 12px 5px !important; }
        .tabla-lidia tr:nth-child(even) { background-color: #f8f9fa !important; }
        .tabla-lidia tr:nth-child(odd) { background-color: #ffffff !important; }

        /* Fila de inventario crítico */
        .fila-critica { background-color: #ffb3b3 !important; color: #cc0000 !important; }
        .fila-critica td { color: #cc0000 !important; border-bottom: 1px solid #ff9999 !important; }

        /* Barra Inferior */
        .footer-azul { background-color: #5b8df2; height: 80px; display: flex; align-items: center; padding-left: 30px; border-top: 4px solid #1a1a1a; }
        .flecha-regreso { color: white; font-size: 3rem; font-weight: bold; cursor: pointer; text-decoration: none; }

        /* Estilos Modales */
        .modal-estilo .ui-dialog-titlebar { background-color: #5b8df2 !important; color: white !important; text-align: center;}
        .modal-estilo.ui-dialog { border-radius: 12px !important; overflow: hidden; border: 2px solid #ccc;}
        .campo-formulario { margin-bottom: 15px; }
        .campo-formulario label { display: block; font-weight: bold; color: #4A4A4A; margin-bottom: 5px; }
    </style>
</h:head>

<h:body>
    <p:growl id="notificacion" showDetail="true" life="4000">
        <p:autoUpdate />
    </p:growl>

    <!-- COMANDO INVISIBLE: Recarga la tabla de inventario cuando registras un producto nuevo -->
    <h:form>
        <p:remoteCommand name="rcActualizarInventario" action="#{inventarioBeanUI.cargarInventario}" update=":frmInventario:tablaProductos" />
    </h:form>

    <div class="pantalla-principal">
        <div class="header-azul">
            <span>PUESTO LIDIA</span>
            <span style="display: flex; align-items: center; gap: 10px;">
                USUARIO <i class="pi pi-user" style="font-size: 1.5rem; background: white; color: #5b8df2; border-radius: 50%; padding: 5px;"></i>
            </span>
        </div>
        <div class="subheader-gris">
            INVENTARIO
        </div>

        <div class="contenedor-interior">
            <div class="titulo-consulta">Consulta de productos</div>

            <h:form id="frmInventario">
                <div style="display: flex; gap: 15px; align-items: flex-end; margin-bottom: 25px;">
                    <div style="flex-grow: 1;">
                        <p:outputLabel value="Buscar producto" style="font-weight: bold; color: #666; display: block; margin-bottom: 5px;"/>
                        <p:inputText value="#{inventarioBeanUI.textoBusqueda}" placeholder="Ejemplo: Coca Cola 600ml" styleClass="input-busqueda"/>
                    </div>

                    <p:commandButton value="FILTROS" styleClass="btn-top-rojo" action="#{inventarioBeanUI.buscarProducto}" update="tablaProductos"/>
                    <p:commandButton value="Entrada" styleClass="btn-top-rojo" actionListener="#{inventarioBeanUI.abrirModalEntrada}" update=":formEntrada"/>
                    <p:commandButton value="Registro" styleClass="btn-top-rojo" type="button" onclick="PF('wvModalRegistro').show();"/>
                    <p:commandButton value="REPORTE" styleClass="btn-top-rojo" type="button"/>
                </div>

                <!-- TABLA ACTUALIZADA CON SCROLL Y ORDENAMIENTO -->
                <p:dataTable id="tablaProductos" var="prod" value="#{inventarioBeanUI.listaProductos}"
                             styleClass="tabla-lidia"
                             scrollable="true" scrollHeight="350"
                             selectionMode="single" selection="#{inventarioBeanUI.productoSeleccionado}" rowKey="#{prod.idProducto}"
                             rowStyleClass="#{prod.cantidad le prod.umbral ? 'fila-critica' : null}">

                    <p:column headerText="ID" style="width: 15%;">
                        <h:outputText value="#{prod.idProducto}" />
                    </p:column>

                    <p:column headerText="NOMBRE" sortBy="#{prod.nombre}" style="width: 25%; text-align: left;">
                        <h:outputText value="#{prod.nombre}" />
                    </p:column>

                    <p:column headerText="PRECIO $" sortBy="#{prod.precio}" style="width: 15%;">
                        <h:outputText value="$#{prod.precio}">
                            <f:convertNumber pattern="#0.00" />
                        </h:outputText>
                    </p:column>

                    <p:column headerText="CANTIDAD" style="width: 10%;">
                        <h:outputText value="#{prod.cantidad}" />
                    </p:column>

                    <p:column headerText="CANT. CRITICA" style="width: 10%;">
                        <h:outputText value="#{prod.umbral}" />
                    </p:column>

                    <p:column headerText="ACCIONES" style="width: 25%;">
                        <p:commandButton value="MODIFICAR" styleClass="btn-pildora-rojo" type="button"/>
                        <p:commandButton value="ELIMINAR" styleClass="btn-pildora-negro" type="button"/>
                    </p:column>
                </p:dataTable>
            </h:form>
        </div>

        <div class="footer-azul">
            <h:outputLink value="#" styleClass="flecha-regreso">
                <i class="pi pi-arrow-left" style="font-size: 2.5rem; font-weight: 900;"></i>
            </h:outputLink>
        </div>
    </div>

    <!-- ========================================================= -->
    <!-- MODAL DE ENTRADA -->
    <!-- ========================================================= -->
    <p:dialog id="modalEntrada" widgetVar="wvModalEntrada" header="Entrada de Producto" styleClass="modal-estilo" modal="true" resizable="false" width="400">
        <h:form id="formEntrada">
            <div class="ui-fluid">
                <div style="margin-bottom: 15px; background: #e9ecef; padding: 10px; border-radius: 8px;">
                    <h:outputText value="#{inventarioBeanUI.productoSeleccionado.nombre}" style="font-weight: bold; display:block;" />
                    <h:outputText value="Stock actual: #{inventarioBeanUI.productoSeleccionado.cantidad} unidades" />
                </div>

                <div class="campo-formulario">
                    <p:outputLabel for="cantIngreso" value="Cantidad nueva a ingresar:" />
                    <p:inputNumber id="cantIngreso" value="#{inventarioBeanUI.cantidadEntrada}" decimalPlaces="0" minValue="1">
                        <!-- AJAX para cálculo en tiempo real -->
                        <p:ajax event="change" update="lblNuevoTotal" />
                    </p:inputNumber>
                </div>

                <div style="text-align: center; margin-top: 15px; background-color: #d4edda; padding: 10px; border-radius: 8px; border: 1px solid #c3e6cb;">
                    <h:outputText value="Total proyectado: " style="font-weight: bold; color: #155724;" />
                    <h:outputText id="lblNuevoTotal"
                                  value="#{inventarioBeanUI.productoSeleccionado.cantidad + (inventarioBeanUI.cantidadEntrada == null ? 0 : inventarioBeanUI.cantidadEntrada)}"
                                  style="font-weight: bold; font-size: 1.3rem; color: #155724;"/>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <p:commandButton value="CANCELAR" type="button" styleClass="ui-button-outlined ui-button-secondary" onclick="PF('wvModalEntrada').hide();" />
                <p:commandButton value="GUARDAR" action="#{inventarioBeanUI.registrarEntrada}" styleClass="ui-button-danger" update=":frmInventario:tablaProductos" />
            </div>
        </h:form>
    </p:dialog>

    <!-- ========================================================= -->
    <!-- MODAL DE REGISTRO -->
    <!-- ========================================================= -->
    <p:dialog id="modalRegistro" widgetVar="wvModalRegistro" header="Registro de producto" styleClass="modal-estilo" modal="true" resizable="false" closeOnEscape="true" width="450" showEffect="fade" hideEffect="fade">
        <h:form id="formRegistro">
            <div class="ui-fluid">
                <div class="campo-formulario">
                    <p:outputLabel for="idProd" value="ID" />
                    <p:inputText id="idProd" value="#{productoBeanUI.idProducto}" placeholder="Ejemplo: 0001230600" maxlength="30"/>
                </div>
                <div class="campo-formulario">
                    <p:outputLabel for="nombreProd" value="Nombre del producto" />
                    <p:inputText id="nombreProd" value="#{productoBeanUI.nombre}" placeholder="Ejemplo: Coca Cola 600ml" maxlength="30"/>
                </div>
                <div class="campo-formulario">
                    <p:outputLabel for="precioProd" value="Precio ($)" />
                    <p:inputNumber id="precioProd" value="#{productoBeanUI.precio}" symbol="$ " symbolPosition="p" decimalSeparator="." thousandSeparator="," decimalPlaces="2" placeholder="Ejemplo: 25.00" minValue="0" />
                </div>
                <div class="campo-formulario">
                    <p:outputLabel for="cantidadProd" value="Cantidad inicial en inventario" />
                    <p:inputNumber id="cantidadProd" value="#{productoBeanUI.cantidad}" decimalPlaces="0" placeholder="Ejemplo: 50" minValue="0" />
                </div>
                <div class="campo-formulario">
                    <p:outputLabel for="umbralProd" value="Cantidad crítica" />
                    <p:inputNumber id="umbralProd" value="#{productoBeanUI.umbral}" decimalPlaces="0" placeholder="Ejemplo: 10 (mínimo antes de alerta)" minValue="0" />
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 25px;">
                <p:commandButton value="CANCELAR" type="button" styleClass="ui-button-outlined ui-button-secondary" onclick="PF('wvModalRegistro').hide();" />
                <p:commandButton value="REGISTRAR" action="#{productoBeanUI.altaProducto}" styleClass="ui-button-danger" update="formRegistro :notificacion" oncomplete="if (!args.validationFailed) { PF('wvModalRegistro').hide(); rcActualizarInventario(); }"/>
            </div>
        </h:form>
    </p:dialog>

</h:body>
</html>
